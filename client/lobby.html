<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyBoard Lobby</title>

    <link rel="stylesheet" href="css/lobby.css">
</head>

<body>

<header>

    <div class="logo">

        🎲 LuckyBoard

    </div>

    <div class="topButtons">

        <button id="settingsBtn">⚙️</button>

    </div>

</header>

<div class="main">

    <div class="left">

        <div class="card">

            <h2>🎮 الغرفة</h2>

            <h1 id="roomCode">000000</h1>

            <button id="copyBtn">

                📋 نسخ الكود

            </button>

        </div>

        <div class="card">

            <h2>

                👥 اللاعبون

            </h2>

            <ul id="playerList">

            </ul>

        </div>

    </div>

    <div class="right">

        <div class="chatBox">

            <h2>💬 الشات</h2>

            <div id="messages">

            </div>

            <div class="sendBox">

                <input
                id="chatInput"
                placeholder="اكتب رسالة...">

                <button id="sendBtn">

                    إرسال

                </button>

            </div>

        </div>

        <button id="startBtn">

            🚀 ابدأ اللعبة

        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/lobby.js"></script>

</body>

</html>
